[DEPENDENCIES]
# Keep dev-only artifacts out of the playable web bundle (build/web/contra-vk.apk).
# pygbag already skips /build, /.git, /.github, __pycache__ and dotfolders;
# these are the project-specific extras that would otherwise bloat the .apk.
ignoreDirs = ["screenshots","tools"]
ignoreFiles = ["_smoke_test.py","pygbag.ini",".gitignore"]
